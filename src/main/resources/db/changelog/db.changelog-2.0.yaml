databaseChangeLog:
  - changeSet:
      id: 1
      author: desckapg
      preConditions:
        - onFail: HALT
          tableExists:
            tableName: hotels
      changes:
        - addDefaultValue:
            tableName: hotels
            columnName: created_at
            defaultValueComputed: CURRENT_TIMESTAMP()
        - addDefaultValue:
            tableName: hotels
            columnName: updated_at
            defaultValueComputed: CURRENT_TIMESTAMP()
