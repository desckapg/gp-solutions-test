databaseChangeLog:
  - changeSet:
      id: 1
      author: desckapg
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: hotels
      changes:
        - createTable:
            tableName: hotels
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: check_in_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: check_out_time
                  type: TIME
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: desckapg
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: house_number
                  type: VARCHAR(31)
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: postal_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_address_hotel
                    referencedTableName: hotels
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 3
      author: desckapg
      changes:
        - createTable:
            tableName: contacts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_contact_hotel
                    referencedTableName: hotels
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 4
      author: desckapg
      changes:
        - createTable:
            tableName: amenities
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_amenity_hotel
                    referencedTableName: hotels
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 5
      author: desckapg
      changes:
        - createIndex:
            indexName: idx_hotels_brand
            tableName: hotels
            columns:
              - column:
                  name: brand
        - createIndex:
            indexName: idx_hotels_name
            tableName: hotels
            columns:
              - column:
                  name: name
  - changeSet:
      id: 6
      author: desckapg
      changes:
        - createIndex:
            indexName: idx_addresses_city
            tableName: addresses
            columns:
              - column:
                  name: city
        - createIndex:
            indexName: idx_addresses_country
            tableName: addresses
            columns:
              - column:
                  name: country
  - changeSet:
      id: 7
      author: desckapg
      changes:
        - createIndex:
            indexName: idx_amenities_name
            tableName: amenities
            columns:
              - column:
                  name: name
  - changeSet:
      id: 8
      author: desckapg
      changes:
        - createIndex:
            indexName: idx_addresses_hotel_id
            tableName: addresses
            columns:
              - column:
                  name: hotel_id
        - createIndex:
            indexName: idx_contacts_hotel_id
            tableName: contacts
            columns:
              - column:
                  name: hotel_id
        - createIndex:
            indexName: idx_amenities_hotel_id
            tableName: amenities
            columns:
              - column:
                  name: hotel_id