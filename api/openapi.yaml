openapi: 3.1.0
info:
  version: '1.0'
  title: openapi
servers:
  - url: http://localhost:8092
paths:
  /property-view/hotels:
    get:
      summary: Get all hotels
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HotelShort'
    post:
      summary: Create hotel
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelShort'
              examples:
                Example 1:
                  value:
                    id: 1
                    name: DoubleTree by Hilton Minsk
                    description: >-
                      The DoubleTree by Hilton Hotel Minsk offers 193 luxurious
                      rooms in the Belorussian capital and stunning views of
                      Minsk city from the hotel's 20th floor ...
                    address: 9 Pobediteley Avenue, Minsk, 220004, Belarus
                    phone: +375 17 309-80-00
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelCreate'
            examples: {}
  /property-view/hotels/{id}:
    get:
      summary: Get hotel by {id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelDetailed'
        '404':
          description: Not Found
  /property-view/search:
    get:
      summary: Get all hotels by criteria
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HotelShort'
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: country
          schema:
            type: string
        - in: query
          name: amenities
          schema:
            type: string
  /property-view/hotels/{id}/amenities:
    post:
      summary: Add amenities to hotel with {id}
      responses:
        '201':
          description: Created
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
  /property-view/histogram/city:
    get:
      summary: Find hotels count groupped by city
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
  /property-view/histogram/brand:
    get:
      summary: Find hotels count groupped by brand
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
  /property-view/histogram/amenities:
    get:
      summary: Find hotels count groupped by amenities
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
  /property-view/histogram/country:
    get:
      summary: Find hotels count groupped by country
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
components:
  schemas:
    HotelShort:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        address:
          type: string
        phone:
          type: string
      x-apidog-orders:
        - id
        - name
        - description
        - address
        - phone
      required:
        - id
        - name
        - address
        - phone
    HotelDetailed:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        brand:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        contacts:
          $ref: '#/components/schemas/Contacts'
        arrivalTime:
          type: object
          properties:
            checkIn:
              type: string
            checkOut:
              type: string
          x-apidog-orders:
            - checkIn
            - checkOut
          required:
            - checkIn
        amenities:
          type: array
          items:
            type: string
      x-apidog-orders:
        - id
        - name
        - description
        - brand
        - address
        - contacts
        - arrivalTime
        - amenities
      required:
        - id
        - name
        - brand
        - address
        - contacts
        - arrivalTime
        - amenities
    Address:
      type: object
      properties:
        houseNumber:
          type: string
        street:
          type: string
        city:
          type: string
        country:
          type: string
        postCode:
          type: string
      x-apidog-orders:
        - houseNumber
        - street
        - city
        - country
        - postCode
      required:
        - houseNumber
        - street
        - city
        - country
        - postCode
    Contacts:
      type: object
      properties:
        phone:
          type: string
        email:
          type: string
      x-apidog-orders:
        - phone
        - email
      required:
        - phone
        - email
    HotelCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        brand:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        contacts:
          $ref: '#/components/schemas/Contacts'
        arrivalTime:
          type: object
          properties:
            checkIn:
              type: string
            checkOut:
              type: string
          x-apidog-orders:
            - checkIn
            - checkOut
          required:
            - checkIn
      x-apidog-orders:
        - name
        - description
        - brand
        - address
        - contacts
        - arrivalTime
      required:
        - name
        - brand
        - address
        - contacts
        - arrivalTime
